services:
  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "no" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # Opt-in full stack: `docker compose --profile full up --build -d`
  # Without the profile, `docker compose up -d` starts only Redis (dev loop).
  app:
    build: .
    container_name: rate-limiter-app
    profiles: [ "full" ]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      API_PORT: "3000"
      METRICS_PORT: "9090"
      FAILURE_MODE: fail-open
      DEFAULT_ALGORITHM: token-bucket
      DEFAULT_WINDOW_MS: "60000"
      DEFAULT_MAX_REQUESTS: "100"
    ports:
      - "3000:3000"
      - "9090:9090"
    restart: unless-stopped
